dataset: Novamag
evaluation_mode: ood

train_dataset_path: data/novamag-magnetism.csv
test_dataset_path: data/novamag-magnetism.csv

models:
  - rf
  - xgb

enable_data_visualization: false
enable_hyperparameter_tuning: false
enable_ablation_study: false

cv_folds: 5
cv_shuffle: true
cv_random_state: 0
cv_seeds: [0, 1]

target_column: saturation magnetization
formula_column: chemical formula

ood_mode: all
ood_fractions: [0.1, 0.2]
sparsex_neighbors: 5
ood_max_splits: 2
ood_seed: 0
ood_output_dir: ./results/ood_pr6